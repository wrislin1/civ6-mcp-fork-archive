# Slice 1: gemma-only strategy A/B.
#
# Human plays seat 0 (Gaul). Puppet seats 1-7 all run gemma4-26b on GPU0.
# Seats are interleaved to reduce first-come reward bias:
#   treatment = 1,3,5,7
#   control   = 2,4,6
#
# Do not set run_id here. The live watcher passes --run-id so its .arena-runs
# files and transcript directory agree.
max_puppet_turns: 140
idle_poll_limit: 3600
civs:
  - player: 1
    provider: local
    model: gemma4-26b
    gateway: http://192.168.20.196:11440/v1
    tools: full
    result_char_cap: 6000
    max_steps: 10
    playbook: condensed
    context_budget: auto
    briefing:
      enabled: true
      map_radius: 3
      sections: [overview, units, cities, map, research, production_options, threats, rivals, empire_resources]
  - player: 2
    provider: local
    model: gemma4-26b
    gateway: http://192.168.20.196:11440/v1
    tools: minimal
    result_char_cap: 1500
    max_steps: 6
    playbook: none
